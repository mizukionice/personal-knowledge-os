name: Process Job

on:
  repository_dispatch:
    types: [process_job]
  # デバッグ用の手動起動
  workflow_dispatch:
    inputs:
      job_id:
        description: 'jobs.id (UUID)'
        required: true
        type: string

# 同一jobの多重実行を防ぐ（claimも冪等だが起動自体を抑止する）
concurrency:
  group: process-job-${{ github.event.client_payload.job_id || inputs.job_id }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # バージョンは package.json の packageManager フィールドから解決される

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run batch job
        run: pnpm --filter @pkos/batch start
        env:
          JOB_ID: ${{ github.event.client_payload.job_id || inputs.job_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
