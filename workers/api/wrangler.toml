# Cloudflare Workers API
# secrets（SUPABASE_JWT_SECRET, GITHUB_DISPATCH_TOKEN, R2_ACCESS_KEY_ID,
# R2_SECRET_ACCESS_KEY, ANTHROPIC_API_KEY）は `wrangler secret put` で設定する。
# ローカル開発は .dev.vars（gitignore済み）に置く。
name = "pkos-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[vars]
# URLとanon (publishable) keyは公開前提の値（フロントのバンドルにも含まれる）
SUPABASE_URL = "https://lieujxeumqpgribvzoiv.supabase.co"
SUPABASE_ANON_KEY = "sb_publishable_IUP8nQMT9-nVmgsc5G-eLg_SGiRiMXu"
ALLOWED_ORIGIN = "*"
CF_ACCOUNT_ID = "your-cloudflare-account-id"
R2_BUCKET = "personal-knowledge-os"
GITHUB_REPO = "mizukionice/personal-knowledge-os"

[[r2_buckets]]
binding = "R2"
bucket_name = "personal-knowledge-os"
# ローカル開発でR2バインディングを実バケットに接続する（wrangler devのみ有効）
remote = true

# 検索クエリのembedding用（BGE-M3）。ローカル開発でも実APIにプロキシされる
[ai]
binding = "AI"
remote = true

[observability]
enabled = true
